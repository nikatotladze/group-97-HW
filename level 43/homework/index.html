<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Results Summary Component</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@500;700;800&display=swap" rel="stylesheet">
</head>
<body class="min-h-screen flex items-center justify-center p-0 md:p-4">

    <main class="bg-white w-full max-w-[736px] flex flex-col md:flex-row md:rounded-[32px] shadow-2xl overflow-hidden">
        
        <!-- Left Section: Your Result -->
        <section class="result-gradient w-full md:w-1/2 rounded-b-[32px] md:rounded-[32px] p-10 flex flex-col items-center text-center text-white">
            <h2 class="text-[#c8c7ff] text-lg md:text-2xl font-bold mb-8">Your Result</h2>
            
            <div class="circle-gradient w-36 h-36 md:w-52 md:h-52 rounded-full flex flex-col items-center justify-center mb-8">
                <span class="text-5xl md:text-7xl font-extrabold leading-tight">76</span>
                <span class="text-[#8b82ff] font-bold text-sm md:text-lg opacity-60">of 100</span>
            </div>
            
            <h3 class="text-2xl md:text-3xl font-bold mb-4">Great</h3>
            <p class="text-[#c8c7ff] text-[16px] md:text-[18px] leading-snug max-w-[260px]">
                You scored higher than 65% of the people who have taken these tests.
            </p>
        </section>

        <!-- Right Section: Summary -->
        <section class="w-full md:w-1/2 p-8 md:p-10 bg-white">
            <h2 class="text-[#303b59] text-lg md:text-2xl font-bold mb-6">Summary</h2>
            
            <div class="space-y-4 mb-10">
                <!-- Reaction Item -->
                <div class="summary-item-reaction flex justify-between items-center p-4 rounded-xl">
                    <div class="flex items-center gap-3">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="none" viewBox="0 0 20 20"><path stroke="#F55" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.25" d="M10.833 8.333V2.5l-6.666 9.167h5V17.5l6.666-9.167h-5Z"/></svg>
                        <span class="font-bold">Reaction</span>
                    </div>
                    <p class="text-[#303b59] font-bold">80 <span class="text-gray-400 font-medium">/ 100</span></p>
                </div>

                <!-- Memory Item -->
                <div class="summary-item-memory flex justify-between items-center p-4 rounded-xl">
                    <div class="flex items-center gap-3">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="none" viewBox="0 0 20 20"><path stroke="#FFB21E" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.25" d="M5.833 11.667a2.5 2.5 0 1 0 .834 4.858"/><path stroke="#FFB21E" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.25" d="M3.553 13.004a3.333 3.333 0 0 1-.728-5.53m.025-.067a5 5 0 0 1 9.595-1.708 5 5 0 0 1 4.9 4.074 3.333 3.333 0 0 1-1.028 6.474h-4.471"/><path stroke="#FFB21E" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.25" d="M10 12.5V17.5M12.5 15H7.5"/></svg>
                        <span class="font-bold">Memory</span>
                    </div>
                    <p class="text-[#303b59] font-bold">92 <span class="text-gray-400 font-medium">/ 100</span></p>
                </div>

                <!-- Verbal Item -->
                <div class="summary-item-verbal flex justify-between items-center p-4 rounded-xl">
                    <div class="flex items-center gap-3">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="none" viewBox="0 0 20 20"><path stroke="#00BB8F" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.25" d="M7.5 10h5M7.5 7.708h5M7.5 12.292h5M2.5 5.833V14.167a1.667 1.667 0 0 0 1.667 1.667h11.666A1.667 1.667 0 0 0 17.5 14.167V5.833a1.667 1.667 0 0 0-1.667-1.667H4.167A1.667 1.667 0 0 0 2.5 5.833Z"/></svg>
                        <span class="font-bold">Verbal</span>
                    </div>
                    <p class="text-[#303b59] font-bold">61 <span class="text-gray-400 font-medium">/ 100</span></p>
                </div>

                <!-- Visual Item -->
                <div class="summary-item-visual flex justify-between items-center p-4 rounded-xl">
                    <div class="flex items-center gap-3">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="none" viewBox="0 0 20 20"><path stroke="#1125D6" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.25" d="M10 11.667a1.667 1.667 0 1 0 0-3.334 1.667 1.667 0 0 0 0 3.334Z"/><path stroke="#1125D6" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.25" d="M17.5 10c-1.574 2.492-4.402 5-7.5 5s-5.926-2.508-7.5-5C4.416 7.632 7.347 5 10 5s5.584 2.632 7.5 5Z"/></svg>
                        <span class="font-bold">Visual</span>
                    </div>
                    <p class="text-[#303b59] font-bold">73 <span class="text-gray-400 font-medium">/ 100</span></p>
                </div>
            </div>

            <button class="w-full bg-[#303b59] text-white py-4 rounded-full font-bold text-lg transition-all hover:bg-[#2e2be9] btn-active">
                Continue
            </button>
        </section>
    </main>
    <link rel="stylesheet" href="style.css">.
</body>
</html>
