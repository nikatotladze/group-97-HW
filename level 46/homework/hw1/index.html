<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->
  <link rel="stylesheet" href="./style.css">
  <link rel="icon" type="image/png" sizes="32x32" href="./favicon-32x32.png">

  <title>product card</title>

  <main class="card-container">
    <div class="card-image">
      <img src="./image-product-desktop.jpg" alt="product image">
    </div>


    <div class="card-content">
      <span class="company-name">perfume</span>

      <h1 class="product-name">Gabrielle Essence Eau De Parfum</h1>

      <p class="product-description">A floral, solar and voluptuous interpretation composed by Olivier Polge, Perfumer-Creator for the House of CHANEL.</p>

      <div class="price">
        <span class="current-price">$149.99</span>
        <span class="old-price">$169.99</span>
      </div>

      <button class="button">
        add to cart
      </button>

  </main>

</body>
</html>
